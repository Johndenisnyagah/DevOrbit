{# Legacy server-rendered task creation form. The active form is TaskCreatePage.jsx. #}
{% extends "base.html" %}
{% block title %}New Task — DevOrbit{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('task_list') }}" style="font-size:13px;color:var(--text-3);">← Back to Tasks</a>
    <h1 class="page-heading" style="margin-top:6px">New Task</h1>
  </div>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('task_create') }}">
    <div class="form-group">
      <label class="form-label">Title <span class="required">*</span></label>
      <input type="text" name="title" class="form-input"
             placeholder="e.g. Fix null pointer in UserService" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input form-textarea"
                placeholder="Describe the task, relevant files, or context."
                rows="4"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Priority</label>
      <div class="radio-group">
        {% for p in ['High', 'Medium', 'Low'] %}
        <label class="radio-label radio-{{ p }}">
          <input type="radio" name="priority" value="{{ p }}"
                 {% if p == 'Medium' %}checked{% endif %}>
          {{ p }}
        </label>
        {% endfor %}
      </div>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('task_list') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Create Task</button>
    </div>
  </form>
</div>
{% endblock %}
